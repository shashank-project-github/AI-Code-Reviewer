<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B4BFF"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="100" height="100" rx="28" fill="url(#bg)">
    <animateTransform
      attributeName="transform"
      type="scale"
      values="1;1.03;1"
      dur="2s"
      repeatCount="indefinite"/>
  </rect>

  <!-- Left Bracket -->
  <path d="M50 38 L35 60 L50 82"
        fill="none"
        stroke="white"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0;-2 0;0 0"
      dur="1.5s"
      repeatCount="indefinite"/>
  </path>

  <!-- Right Bracket -->
  <path d="M70 38 L85 60 L70 82"
        fill="none"
        stroke="white"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0;2 0;0 0"
      dur="1.5s"
      repeatCount="indefinite"/>
  </path>

  <!-- Center Dot -->
  <circle cx="60" cy="60" r="6" fill="white">
    <animate
      attributeName="r"
      values="6;8;6"
      dur="1.5s"
      repeatCount="indefinite"/>
  </circle>
</svg>